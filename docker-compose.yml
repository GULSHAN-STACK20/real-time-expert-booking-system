services:
  mongo:
    image: mongo:7
    container_name: expert-booking-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: expert-booking-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/expert-booking
      CLIENT_ORIGIN: http://localhost:5173
      JWT_SECRET: change-me
    depends_on:
      - mongo
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: expert-booking-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  mongo_data:
